name: Update NC Flood Watch Map

on:
  schedule:
    # Runs at :00 and :30 past every hour (UTC). Adjust as you like.
    - cron: "0,30 * * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

# Needed so the workflow can push the updated PNG back to the repo
permissions:
  contents: write

jobs:
  update-map:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests geopandas shapely matplotlib

      - name: Generate map
        run: python3 nc_flood_watch_map.py

      - name: Commit updated map if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nc_flood_watch_map.png
          git diff --staged --quiet || git commit -m "Update NC flood watch map [skip ci]"
          git push
